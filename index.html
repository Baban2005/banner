<body>
    <div class="banner"
        style="background-color: #2c3e50; color: white; padding: 30px; text-align: center; margin-bottom: 20px; font-family: sans-serif; border-radius: 8px;">
        <h1>Things to explore throughout my life
        </h1>
    </div>

    <div style="max-width: 800px; margin: 0 auto; font-family: sans-serif; padding: 20px;">

        <div style="margin-bottom: 20px; display: flex; gap: 10px; flex-wrap: wrap;">
            <input type="text" id="itemInput" placeholder="Type a new goal..."
                style="flex-grow: 1; padding: 10px; font-size: 16px; border: 1px solid #ccc; border-radius: 4px;">
            <button id="addBtn"
                style="padding: 10px 20px; font-size: 16px; background-color: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer;">Add
                Item</button>
            <button id="fontBtn"
                style="padding: 10px 20px; font-size: 16px; background-color: #2980b9; color: white; border: none; border-radius: 4px; cursor: pointer;">Change
                Font</button>
            <button id="boldBtn"
                style="padding: 10px 20px; font-size: 16px; background-color: #8e44ad; color: white; border: none; border-radius: 4px; cursor: pointer;">Make
                Bold</button>
        </div>

        <ul id="exploreList"
            style="font-size: 18px; line-height: 1.8; background-color: #f9f9f9; padding: 20px 40px; border-radius: 8px; border: 1px solid #eee;">
            <li>Master python</li>
            <li>Learn java</li>
            <li>get a job after graduation</li>
        </ul>

    </div>

    <script>
        // DOM Elements
        const itemInput = document.getElementById('itemInput');
        const addBtn = document.getElementById('addBtn');
        const fontBtn = document.getElementById('fontBtn');
        const boldBtn = document.getElementById('boldBtn');
        const exploreList = document.getElementById('exploreList');

        const fonts = ['sans-serif', 'serif', 'monospace', 'cursive', 'fantasy'];
        let fontIndex = 0;

        // add new item to the list
        addBtn.addEventListener('click', function () {
            const newItemText = itemInput.value.trim();

            if (newItemText !== '') {
                const li = document.createElement('li');
                li.textContent = newItemText;
                exploreList.appendChild(li);

                // clear input after adding
                itemInput.value = '';
                itemInput.focus();
            } else {
                alert('Please enter an item to add to your list.');
            }
        });

        // change font style
        fontBtn.addEventListener('click', function () {
            fontIndex = (fontIndex + 1) % fonts.length;
            exploreList.style.fontFamily = fonts[fontIndex];
        });

        // make text bold or normal
        boldBtn.addEventListener('click', function () {
            if (exploreList.style.fontWeight === 'bold') {
                exploreList.style.fontWeight = 'normal';
            } else {
                exploreList.style.fontWeight = 'bold';
            }
        });
    </script>
</body>
